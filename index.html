<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Procesos — Subgerencia Liquidaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;--border:#E2DDD6;--border2:#CBC6BE;
  --text:#1A1916;--text2:#6B6860;--text3:#A09D99;
  --blue:#1A56DB;--blue-bg:#EBF0FF;--blue-text:#1E3A8A;
  --green:#0D7C3D;--green-bg:#ECFDF5;--green-text:#064E3B;
  --amber:#B45309;--amber-bg:#FFFBEB;--amber-text:#78350F;
  --red:#DC2626;--red-bg:#FEF2F2;--red-text:#7F1D1D;
  --purple:#6D28D9;--purple-bg:#F5F3FF;--purple-text:#4C1D95;
  --sidebar-w:252px;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:28px 28px 40px}

/* SIDEBAR */
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{color:#fff}
.sb-brand-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.sb-brand-sub{font-size:11px;color:var(--text3)}
.sb-nav{padding:10px 8px;flex:1}
.sb-group-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:10px 8px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all .1s;border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500}
.sb-item svg{flex-shrink:0;width:16px;height:16px}
.sb-badge{margin-left:auto;background:var(--red-bg);color:var(--red-text);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;margin-top:auto}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--blue-text);flex-shrink:0}
.avatar-sm{width:26px;height:26px;font-size:10px}

/* TOPBAR */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;flex:1;max-width:320px}
.search-box input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:100%;font-family:var(--font)}
.search-box input::placeholder{color:var(--text3)}
.tb-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.notif{position:relative;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.notif-dot{position:absolute;top:2px;right:2px;width:15px;height:15px;background:var(--red);border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600}
.user-pill{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--surface)}
.user-pill span{font-size:13px;font-weight:500}

/* PAGE HEADER */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px}
.page-hdr h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
.page-hdr p{font-size:13px;color:var(--text2);margin-top:2px}
.hdr-actions{display:flex;gap:10px;flex-shrink:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:background .1s}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1648C8}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:var(--radius)}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:24px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.mc-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mc-val{font-size:30px;font-weight:600;letter-spacing:-1px;line-height:1}
.mc-sub{font-size:12px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:5px}
.mc-dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* FILTERS */
.filters{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;flex:1;min-width:200px}
.filter-search input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:100%;font-family:var(--font)}
select.fsel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font);cursor:pointer;min-width:150px}

/* TABLE */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:9px 14px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.02em}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
.tf{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--text3)}
.pag{display:flex;gap:4px}
.pb{width:28px;height:28px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.pb.active,.pb:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bg-green{background:var(--green-bg);color:var(--green-text)}
.bg-amber{background:var(--amber-bg);color:var(--amber-text)}
.bg-red{background:var(--red-bg);color:var(--red-text)}
.bg-blue{background:var(--blue-bg);color:var(--blue-text)}
.bg-purple{background:var(--purple-bg);color:var(--purple-text)}
.bg-gray{background:var(--surface2);color:var(--text2)}
.bdot{width:6px;height:6px;border-radius:50%}

/* LOADING / EMPTY */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--text3)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px}

/* ALERT */
.alert{padding:10px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none;border-left:3px solid}
.alert-ok{background:var(--green-bg);color:var(--green-text);border-color:var(--green)}
.alert-err{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(26,25,22,.4);z-index:100;display:none;align-items:flex-start;justify-content:flex-end}
.overlay.open{display:flex}
.panel{width:500px;height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hdr{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hdr h2{font-size:16px;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.form-sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.form-sec:first-child{margin-top:0}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--surface);font-family:var(--font)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:72px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.required{color:var(--red)}
.status-bar{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="2" fill="white"/><rect x="13" y="3" width="8" height="8" rx="2" fill="white" opacity=".7"/><rect x="3" y="13" width="8" height="8" rx="2" fill="white" opacity=".7"/><rect x="13" y="13" width="8" height="8" rx="2" fill="white" opacity=".5"/></svg>
      </div>
      <div>
        <div class="sb-brand-text">Control de Procesos</div>
        <div class="sb-brand-sub">Subgerencia Liquidaciones</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-group-label">General</div>
      <button class="sb-item" id="nav-dashboard" onclick="go('dashboard')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
        Dashboard
      </button>
      <div class="sb-group-label">Módulos</div>
      <button class="sb-item active" id="nav-base-olga" onclick="go('base-olga')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.6"/><line x1="9" y1="9" x2="9" y2="21" stroke="currentColor" stroke-width="1.6"/></svg>
        Base Olga
        <span class="sb-badge" id="badge-base-olga"></span>
      </button>
      <button class="sb-item" id="nav-correos" onclick="go('correos')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="1.6"/></svg>
        Correos Electrónicos
        <span class="sb-badge" id="badge-correos"></span>
      </button>
      <button class="sb-item" id="nav-nexura" onclick="go('nexura')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Base Nexura
        <span class="sb-badge" id="badge-nexura"></span>
      </button>
      <button class="sb-item" id="nav-traslados" onclick="go('traslados')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 12h14M15 7l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Traslados
        <span class="sb-badge" id="badge-traslados"></span>
      </button>
      <button class="sb-item" id="nav-resoluciones" onclick="go('resoluciones')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.6"/><polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.6"/><line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.6"/><line x1="8" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.6"/></svg>
        Resoluciones
      </button>
      <button class="sb-item" id="nav-fiscalizacion" onclick="go('fiscalizacion')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><polyline points="4,20 8,13 12,16 16,8 20,4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Fiscalización
        <span class="sb-badge" id="badge-fiscalizacion"></span>
      </button>
      <button class="sb-item" id="nav-tutelas" onclick="go('tutelas')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 2l-9 4v6c0 5.25 3.9 10.15 9 11 5.1-.85 9-5.75 9-11V6z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        Tutelas
        <span class="sb-badge" id="badge-tutelas"></span>
      </button>
    </nav>
    <div class="sb-footer">
      <div class="avatar">AU</div>
      <div>
        <div style="font-size:13px;font-weight:500">Admin Usuario</div>
        <div style="font-size:11px;color:var(--text3)">Administrador</div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="search-box">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Buscar procesos, expedientes..." id="global-q" oninput="applyFilters()">
      </div>
      <div class="tb-actions">
        <div class="status-bar">
          <div class="status-dot" id="api-dot"></div>
          <span id="api-status">Conectando...</span>
        </div>
        <div class="notif">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.6"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.6"/></svg>
          <div class="notif-dot" id="notif-count">0</div>
        </div>
        <div class="user-pill">
          <div class="avatar avatar-sm">AU</div>
          <span>Admin Usuario</span>
        </div>
      </div>
    </header>

    <main class="page" id="page">
      <div id="alert" class="alert alert-ok"></div>

      <div class="page-hdr">
        <div>
          <h1 id="pg-title">Base Olga</h1>
          <p id="pg-sub">Gestión de expedientes y actos administrativos</p>
        </div>
        <div class="hdr-actions">
          <button class="btn" onclick="loadData(true)">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M1 4v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 1 0 .49-4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Actualizar
          </button>
          <button class="btn btn-primary" onclick="openPanel()">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Nuevo Registro
          </button>
        </div>
      </div>

      <!-- METRICS -->
      <div class="metrics" id="metrics"></div>

      <!-- FILTERS -->
      <div class="filters">
        <div class="filter-search">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input type="text" placeholder="Buscar en todos los campos..." id="table-q" oninput="applyFilters()">
        </div>
        <select class="fsel" id="f-estado" onchange="applyFilters()">
          <option value="">Todos los estados</option>
          <option>PENDIENTE</option><option>CONTESTADO</option><option>VENCIDO</option><option>CERRADO</option>
        </select>
        <select class="fsel" id="f-renta" onchange="applyFilters()">
          <option value="">Todos los tipos</option>
          <option>IMPUESTO SOBRE VEHICULOS</option><option>IMPUESTO DE REGISTRO</option>
          <option>ESTAMPILLA</option><option>PASAPORTE</option><option>IMPUESTO AL CONSUMO</option>
        </select>
        <button class="btn" onclick="exportCSV()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Exportar CSV
        </button>
      </div>

      <!-- TABLE -->
      <div class="tcard">
        <div class="twrap">
          <table>
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="tf">
          <span id="tcount"></span>
          <div class="pag" id="pag"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- SLIDE PANEL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-hdr">
      <h2 id="panel-title">Nuevo Registro</h2>
      <button class="btn btn-icon" onclick="closePanel()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-footer">
      <button class="btn" onclick="closePanel()">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveRecord()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="1.8"/><polyline points="17,21 17,13 7,13 7,21" stroke="currentColor" stroke-width="1.8"/><polyline points="7,3 7,8 15,8" stroke="currentColor" stroke-width="1.8"/></svg>
        Guardar registro
      </button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const API = "https://<TU-BACKEND>.railway.app"; // ← Cambia por tu URL de Railway/Render

const MODULES = {
  "dashboard":    {title:"Dashboard",sub:"Panel principal de control"},
  "base-olga":    {title:"Base Olga",sub:"Gestión de expedientes y actos administrativos",
    cols:["Consec.","Expediente","Contribuyente","Funcionario","Tipo Trámite","Fecha Vencimiento","Estado","Semáforo","Días",""]},

// ── STATE ──────────────────────────────────────────────────────────────────
let mod = "base-olga";
let allData = [];
let filtered = [];
let page = 1;
const PER = 15;
let editRow = null;
let lists = {};
let metrics = {};

// ── INIT ───────────────────────────────────────────────────────────────────
(async()=>{
  await Promise.all([fetchLists(), fetchMetrics()]);
  await loadData();
  checkAPIHealth();
})();

async function checkAPIHealth(){
  try{
    const r = await fetch(`${API}/api/lists`,{method:'GET',signal:AbortSignal.timeout(4000)});
    if(r.ok){
      document.getElementById('api-dot').style.background='var(--green)';
      document.getElementById('api-status').textContent='Conectado a Google Sheets';
    }else throw new Error();
  }catch{
    document.getElementById('api-dot').style.background='var(--amber)';
    document.getElementById('api-status').textContent='Sin conexión — modo offline';
  }
}

async function fetchLists(){
  try{
    const r = await fetch(`${API}/api/lists`);
    if(r.ok) lists = await r.json();
  }catch{}
}

async function fetchMetrics(){
  try{
    const r = await fetch(`${API}/api/metrics`);
    if(r.ok) metrics = await r.json();
    updateBadges();
  }catch{}
}

function updateBadges(){
  Object.entries(metrics).forEach(([m,v])=>{
    const el=document.getElementById(`badge-${m}`);
    if(el) el.textContent=v.pendientes>0?v.pendientes:'';
  });
  const total=Object.values(metrics).reduce((s,v)=>s+v.pendientes,0);
  document.getElementById('notif-count').textContent=total;
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function go(m){
  mod=m; page=1; editRow=null;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`nav-${m}`)?.classList.add('active');
  const cfg=MODULES[m]||{};
  document.getElementById('pg-title').textContent=cfg.title||m;
  document.getElementById('pg-sub').textContent=cfg.sub||'';
  loadData();
}

// ── DATA ───────────────────────────────────────────────────────────────────
async function loadData(refresh=false){
  if(mod==='dashboard'){renderDashboard();return;}
  showLoading();
  try{
    const r = await fetch(`${API}/api/records/${mod}`);
    if(!r.ok) throw new Error(await r.text());
    const json = await r.json();
    allData = json.data||[];
    applyFilters();
    if(refresh) showAlert('Datos actualizados desde Google Sheets.','ok');
  }catch(e){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="12" class="empty">Error al cargar datos: ${e.message}<br><small>Verifica que el backend esté corriendo y el CORS configurado.</small></td></tr>`;
    if(refresh) showAlert('Error al conectar con el servidor.','err');
  }
}

function showLoading(){
  document.getElementById('tbody').innerHTML=`<tr><td colspan="12"><div class="loading"><div class="spinner"></div> Cargando desde Google Sheets...</div></td></tr>`;
}

// ── FILTERS ────────────────────────────────────────────────────────────────
function applyFilters(){
  const q=(document.getElementById('table-q')?.value||document.getElementById('global-q')?.value||'').toLowerCase().trim();
  const fe=document.getElementById('f-estado')?.value||'';
  const fr=document.getElementById('f-renta')?.value||'';
  filtered=allData.filter(r=>{
    const row=Object.values(r).join(' ').toLowerCase();
    if(q&&!row.includes(q)) return false;
    if(fe){const s=r['SEMAFORO DE VENCIMIENTO']||r['SEMAFORO']||r['Estado']||'';if(!s.toUpperCase().includes(fe)) return false;}
    if(fr){const rt=r['TIPO DE RENTA']||r['Tipo de solicitud']||'';if(!rt.toUpperCase().includes(fr)) return false;}
    return true;
  });
  page=1;
  renderMetricCards();
  renderTable();
}

// ── METRICS ────────────────────────────────────────────────────────────────
function renderMetricCards(){
  const data=filtered.length?filtered:allData;
  const getSem=(r)=>(r['SEMAFORO DE VENCIMIENTO']||r['SEMAFORO']||r['semaforo']||'').toUpperCase();
  const getEst=(r)=>(r['Estado']||r['ESTADO']||r['estado']||'').toUpperCase();
  const pend=data.filter(r=>getEst(r).includes('PENDIENTE')||getSem(r).includes('PENDIENTE')).length;
  const cont=data.filter(r=>getEst(r).includes('CONTESTADO')||getEst(r).includes('CERRADO')||getSem(r).includes('VERDE')).length;
  const venc=data.filter(r=>getSem(r).includes('ROJO')||getEst(r).includes('VENCIDO')).length;
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-label">Total registros</div><div class="mc-val">${data.length}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--blue)"></span>Módulo activo</div></div>
    <div class="mc"><div class="mc-label">Pendientes</div><div class="mc-val" style="color:var(--amber)">${pend}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--amber)"></span>Sin respuesta</div></div>
    <div class="mc"><div class="mc-label">Contestados</div><div class="mc-val" style="color:var(--green)">${cont}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--green)"></span>Cerrados</div></div>
    <div class="mc"><div class="mc-label">Semáforo rojo</div><div class="mc-val" style="color:var(--red)">${venc}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--red)"></span>Requieren atención</div></div>`;
}

// ── TABLE ──────────────────────────────────────────────────────────────────
function renderTable(){
  const cols=MODULES[mod]?.cols||[];
  document.getElementById('thead').innerHTML=cols.map(c=>`<th>${c}</th>`).join('');
  const total=filtered.length;
  const pages=Math.max(1,Math.ceil(total/PER));
  page=Math.min(page,pages);
  const slice=filtered.slice((page-1)*PER, page*PER);
  if(!slice.length){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="${cols.length}" class="empty">Sin registros. Usa "Nuevo Registro" para agregar datos a Google Sheets.</td></tr>`;
  }else{
    document.getElementById('tbody').innerHTML=slice.map((r,i)=>buildRow(r,i+(page-1)*PER)).join('');
  }
  document.getElementById('tcount').textContent=`${Math.min(total,(page-1)*PER+slice.length)} de ${total} registros`;
  renderPag(pages);
}

function sem(r){
  const s=(r['SEMAFORO DE VENCIMIENTO']||r['SEMAFORO']||r['semaforo']||'').toUpperCase();
  if(s.includes('VERDE')||s.includes('CONTESTADO')) return `<span class="badge bg-green"><span class="bdot" style="background:var(--green)"></span>VERDE</span>`;
  if(s.includes('AMARILLO')) return `<span class="badge bg-amber"><span class="bdot" style="background:var(--amber)"></span>AMARILLO</span>`;
  if(s.includes('ROJO')||s.includes('VENCIDO')) return `<span class="badge bg-red"><span class="bdot" style="background:var(--red)"></span>ROJO</span>`;
  return `<span class="badge bg-gray">—</span>`;
}

function estado(r){
  const e=(r['Estado']||r['ESTADO']||r['estado']||'').toUpperCase();
  if(e.includes('CONTESTADO')||e.includes('CERRADO')||e.includes('ATENDIDA')) return `<span class="badge bg-green">${e||'—'}</span>`;
  if(e.includes('PENDIENTE')||e.includes('PROCESO')) return `<span class="badge bg-amber">${e||'—'}</span>`;
  if(e.includes('VENCIDO')) return `<span class="badge bg-red">${e||'—'}</span>`;
  return `<span class="badge bg-gray">${e||'—'}</span>`;
}

function dias(r){
  const d=r['DIAS PENDIENTES']||r['Días hábiles restantes']||r['dias_pendientes']||'';
  if(d===''||d===null||d===undefined) return '<span style="color:var(--text3)">—</span>';
  const n=parseInt(d);
  const c=n<0?'var(--red)':n<7?'var(--red)':n<15?'var(--amber)':'var(--green)';
  return `<span style="font-weight:500;color:${c};font-family:var(--font-mono)">${n}</span>`;
}

function exp(r){
  const v=r['No.  EXPEDIENTE']||r['No. EXPEDIENTE']||r['No Expediente']||r['EXPEDIENTE']||r['expediente']||'N/A';
  return `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text2)">${v}</span>`;
}

function actBtn(rowIdx){
  return `<button class="btn btn-sm btn-icon" onclick="openPanel(${rowIdx})" title="Editar">
    <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>`;
}

function buildRow(r,i){
  const n=i+1;
  if(mod==='base-olga') return `<tr><td style="color:var(--text3);font-size:12px">${r['No consecutivo']||n}</td><td>${exp(r)}</td><td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r['CONTRIBUYENTE']||r['CONTRIBUYENTE ']||'—'}</td><td>${r['FUNCIONARIO ENCARGADO']||'—'}</td><td><span class="badge bg-blue">${r['TIPO DE TRAMITE']||'—'}</span></td><td style="font-size:12px;font-family:var(--font-mono)">${r['FECHA DE VENCIMIENTO']||'—'}</td><td>${estado(r)}</td><td>${sem(r)}</td><td>${dias(r)}</td><td>${actBtn(i)}</td></tr>`;
  if(mod==='correos') return `<tr><td style="color:var(--text3)">${n}</td><td><span class="badge bg-gray">${r['MES']||'—'}</span></td><td>${r['FUNCIONARIO ENCARGADO']||'—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${r['ASUNTO CORREO']||'—'}</td><td>${r['CONTRIBUYENTE O SOLICITANTE']||'—'}</td><td style="font-size:11px">${r['TIPO DE RENTA']||'—'}</td><td style="font-size:12px;font-family:var(--font-mono)">${r['FECHA DE VENCIMIENTO']||'—'}</td><td>${estado(r)}</td><td>${sem(r)}</td><td>${dias(r)}</td><td>${actBtn(i)}</td></tr>`;
  if(mod==='nexura') return `<tr><td style="color:var(--text3)">${n}</td><td style="font-family:var(--font-mono);font-size:11px">${r['No. radicación']||r['No. radicación externo']||'—'}</td><td style="font-weight:500">${r['Nombre del solicitante']||'—'}</td><td>${r['FUNCIONARIO ENCARGADO']||r['Responsable']||'—'}</td><td><span class="badge bg-purple">${r['TIPO DE TRAMITE']||r['Tipo de solicitud']||'—'}</span></td><td style="font-size:12px;font-family:var(--font-mono)">${r['Fecha límite de respuesta']||'—'}</td><td>${estado(r)}</td><td><span class="badge ${(r['Término']||'').includes('tiempo')?'bg-green':'bg-red'}">${r['Término']||'—'}</span></td><td>${sem(r)}</td><td>${dias(r)}</td><td>${actBtn(i)}</td></tr>`;
  if(mod==='tutelas') return `<tr><td style="color:var(--text3)">${n}</td><td><span class="badge bg-gray">${r['MES']||'—'}</span></td><td>${r['FUNCIONARIO ENCARGADO']||'—'}</td><td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${r['ASUNTO CORREO']||'—'}</td><td style="font-size:11px">${r['TIPO DE RENTA']||'—'}</td><td style="font-size:12px;font-family:var(--font-mono)">${r['FECHA DE VENCIMIENTO']||'—'}</td><td>${estado(r)}</td><td>${sem(r)}</td><td>${actBtn(i)}</td></tr>`;
  if(mod==='resoluciones') return `<tr><td style="color:var(--text3)">${n}</td><td style="font-family:var(--font-mono);font-size:11px">${r['SADE INGRESO']||'—'}</td><td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r['EXPEDIENTE']||'—'}</td><td style="font-family:var(--font-mono);font-size:11px">${r['SADE SALIDA']||'—'}</td><td style="font-weight:500">${r['RESOLUCIÓN NO.']||'—'}</td><td style="font-size:12px;font-family:var(--font-mono)">${r['FECHA']||'—'}</td><td><span class="badge bg-blue">${r['TIPO DE RESOLUCION']||'—'}</span></td><td>${actBtn(i)}</td></tr>`;
  // traslados / fiscalizacion
  return `<tr><td style="color:var(--text3)">${n}</td><td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r['No. EXPEDIENTE']||exp(r)}</td><td style="font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r['CONTRIBUYENTE']||r['CONTRIBUYENTE ']||'—'}</td><td>${r['FUNCIONARIO ENCARGADO']||'—'}</td><td style="font-size:11px">${r['TIPO DE RENTA']||'—'}</td><td><span class="badge bg-blue">${r['TIPO DE TRAMITE']||r['ACTO ADMINISTRATIVO']||'—'}</span></td><td style="font-size:12px;font-family:var(--font-mono)">${r['FECHA VENCIMIENTO']||r['FECHA DE VENCIMIENTO']||'—'}</td><td>${estado(r)}</td><td>${sem(r)}</td><td>${actBtn(i)}</td></tr>`;
}

function renderPag(pages){
  let h='';
  for(let p=1;p<=Math.min(pages,8);p++) h+=`<button class="pb ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  if(pages>8) h+=`<span style="padding:0 4px;color:var(--text3)">…</span><button class="pb" onclick="goPage(${pages})">${pages}</button>`;
  document.getElementById('pag').innerHTML=h;
}
function goPage(p){page=p;renderTable();}

// ── PANEL ──────────────────────────────────────────────────────────────────
function openPanel(rowIdx=null){
  editRow = rowIdx!==null ? rowIdx : null;
  const r = editRow!==null ? filtered[editRow] : null;
  document.getElementById('panel-title').textContent = r ? 'Editar Registro' : `Nuevo — ${MODULES[mod]?.title||mod}`;
  document.getElementById('panel-body').innerHTML = buildForm(r);
  document.getElementById('overlay').classList.add('open');
}
function closePanel(){document.getElementById('overlay').classList.remove('open');editRow=null;}

function sel(id,opts,val='',req=false){
  const star=req?'<span class="required">*</span>':'';
  return `<div class="fg"><label>${id.replace(/-/g,' ')} ${star}</label><select id="f-${id}">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
}
function inp(id,label,type='text',val='',ph='',req=false){
  const star=req?'<span class="required">*</span>':'';
  return `<div class="fg"><label>${label} ${star}</label><input type="${type}" id="f-${id}" value="${val||''}" placeholder="${ph}"></div>`;
}
function ta(id,label,val=''){
  return `<div class="fg"><label>${label}</label><textarea id="f-${id}">${val||''}</textarea></div>`;
}
function gv(id){return(document.getElementById(`f-${id}`)||{}).value||'';}

// ── SAVE ───────────────────────────────────────────────────────────────────
async function saveRecord(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Guardando...';
  const payload = {
    canal:gv('canal'), sade:gv('sade'), expediente:gv('expediente'),
    contribuyente:gv('contribuyente'), funcionario:gv('funcionario'),
    renta:gv('renta-v'), tramite:gv('tramite'), item:gv('item'),
    area:gv('area'), tipo_respuesta:gv('tipo-resp'),
    fecha_acto:gv('fecha-acto'), fecha_vencimiento:gv('fecha-venc'),
    fecha_respuesta:gv('fecha-resp'), numero_resolucion:gv('resolucion'),
    sade_salida:gv('sade-salida'), estado:gv('estado-v'), mes:gv('mes'), obs:gv('obs'),
  };
  if(!payload.contribuyente||!payload.funcionario||!payload.estado){
    showAlert('Completa los campos obligatorios (*)','err');
    btn.disabled=false;btn.innerHTML='<svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="1.8"/><polyline points="17,21 17,13 7,13 7,21" stroke="currentColor" stroke-width="1.8"/><polyline points="7,3 7,8 15,8" stroke="currentColor" stroke-width="1.8"/></svg> Guardar registro';
    return;
  }
  try{
    let url=`${API}/api/records/${mod}`;
    let method='POST';
    if(editRow!==null){url+=`/${editRow+2}`;method='PUT';}
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error(await r.text());
    closePanel();
    await loadData();
    await fetchMetrics();
    showAlert(editRow!==null?'Registro actualizado en Google Sheets.':'Registro guardado en Google Sheets.','ok');
  }catch(e){
    showAlert(`Error al guardar: ${e.message}`,'err');
  }
  btn.disabled=false;
  btn.innerHTML='<svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke="currentColor" stroke-width="1.8"/><polyline points="17,21 17,13 7,13 7,21" stroke="currentColor" stroke-width="1.8"/><polyline points="7,3 7,8 15,8" stroke="currentColor" stroke-width="1.8"/></svg> Guardar registro';
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard(){
  document.getElementById('metrics').innerHTML='';
  const mods=['base-olga','correos','nexura','traslados','fiscalizacion','tutelas'];
  const labels={'base-olga':'Base Olga','correos':'Correos','nexura':'Nexura','traslados':'Traslados','fiscalizacion':'Fiscalización','tutelas':'Tutelas'};
  const colors={'base-olga':'var(--blue)','correos':'#D85A30','nexura':'#1D9E75','traslados':'#BA7517','fiscalizacion':'#6D28D9','tutelas':'#D4537E'};
  const rows=mods.map(m=>{
    const v=metrics[m]||{total:0,pendientes:0,vencidos:0,contestados:0};
    const pct=v.total?Math.round(v.contestados/v.total*100):0;
    return `<tr>
      <td><span style="display:inline-flex;align-items:center;gap:8px;font-weight:500"><span style="width:8px;height:8px;border-radius:50%;background:${colors[m]};flex-shrink:0;display:inline-block"></span>${labels[m]}</span></td>
      <td style="font-family:var(--font-mono);font-weight:500">${v.total}</td>
      <td><span class="badge bg-amber">${v.pendientes}</span></td>
      <td><span class="badge bg-red">${v.vencidos}</span></td>
      <td><span class="badge bg-green">${v.contestados}</span></td>
      <td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${colors[m]};border-radius:3px"></div></div><span style="font-size:12px;font-family:var(--font-mono);min-width:30px">${pct}%</span></div></td>
      <td><button class="btn btn-sm" onclick="go('${m}')">Ver →</button></td>
    </tr>`;
  }).join('');
  document.getElementById('thead').innerHTML='<th>Módulo</th><th>Total</th><th>Pendientes</th><th>Vencidos</th><th>Contestados</th><th style="min-width:140px">% Cumplimiento</th><th></th>';
  document.getElementById('tbody').innerHTML=rows||`<tr><td colspan="7" class="empty">Cargando métricas...</td></tr>`;
  document.getElementById('tcount').textContent='';
  document.getElementById('pag').innerHTML='';
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-label">Total general</div><div class="mc-val">${mods.reduce((s,m)=>s+(metrics[m]?.total||0),0)}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--blue)"></span>Todos los módulos</div></div>
    <div class="mc"><div class="mc-label">Pendientes</div><div class="mc-val" style="color:var(--amber)">${mods.reduce((s,m)=>s+(metrics[m]?.pendientes||0),0)}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--amber)"></span>Requieren gestión</div></div>
    <div class="mc"><div class="mc-label">Contestados</div><div class="mc-val" style="color:var(--green)">${mods.reduce((s,m)=>s+(metrics[m]?.contestados||0),0)}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--green)"></span>Resueltos</div></div>
    <div class="mc"><div class="mc-label">Semáforo rojo</div><div class="mc-val" style="color:var(--red)">${mods.reduce((s,m)=>s+(metrics[m]?.vencidos||0),0)}</div><div class="mc-sub"><span class="mc-dot" style="background:var(--red)"></span>Vencidos</div></div>`;
}

// ── EXPORT ─────────────────────────────────────────────────────────────────
function exportCSV(){
  if(!filtered.length){showAlert('No hay datos para exportar.','err');return;}
  const keys=Object.keys(filtered[0]);
  const csv=[keys.join(','),...filtered.map(r=>keys.map(k=>`"${(r[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv,],{type:'text/csv;charset=utf-8'}));
  a.download=`${mod}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── ALERT ──────────────────────────────────────────────────────────────────
function showAlert(msg,type='ok'){
  const el=document.getElementById('alert');
  el.className=`alert alert-${type}`;
  el.textContent=msg;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}
</script>
